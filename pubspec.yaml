name: make_tone
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image Handling
  camera: ^0.10.5
  image_picker: ^1.0.4
  image: ^4.1.3
  path_provider: ^2.1.0
  path: ^1.9.0

  # Networking
  dio: ^5.3.0

  # On-Device Face Detection
  google_ml_kit: ^0.21.0

  # UI Helpers
  flutter_spinkit: ^5.2.0
  intl: ^0.18.0
  shared_preferences: ^2.2.0

  # TTS (Text-to-Speech)
  kitten_tts_flutter: ^0.0.1
  audioplayers: ^6.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
