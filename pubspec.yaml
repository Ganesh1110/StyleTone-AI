name: make_tone
description: "A new Flutter project."
publish_to: "none"
version: 0.1.1+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image Handling
  camera: ^0.10.5
  image_picker: ^1.0.4
  image: ^4.1.3
  path_provider: ^2.1.0
  path: ^1.9.0

  # Networking
  dio: ^5.3.0

  # On-Device Face Detection
  google_mlkit_face_detection: ^0.12.0

  # UI Helpers
  flutter_spinkit: ^5.2.0
  intl: ^0.18.0
  shared_preferences: ^2.2.0

  # TTS (Text-to-Speech)
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
